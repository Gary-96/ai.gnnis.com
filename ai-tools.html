<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Tools | ai.gnnis.com</title>
    <meta name="description" content="精选全球最受欢迎的AI工具，涵盖AI写作、绘画、视频、音频、编程等领域。">
    <link rel="icon" href="/favicon.ico">
    <link href="static/iconfont.css" rel="stylesheet">
    <link rel="stylesheet" href="static/index.082d951a.css">
    <style>
        .site-header { position: sticky; top: 0; z-index: 9999; display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: rgba(0,0,0,0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .site-logo { color: #fff; font-size: 1.25rem; font-weight: 700; text-decoration: none; letter-spacing: -0.02em; }
        .nav-links { display: flex; gap: 2.5rem; }
        .nav-links a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.95rem; font-weight: 500; transition: color 0.2s ease; }
        .nav-links a:hover { color: #14b8a6; }
        .nav-links a.active { color: #14b8a6; font-weight: 600; }
        .nav-actions { display: flex; gap: 1.5rem; align-items: center; }
        @media (max-width: 768px) { .nav-links { display: none; } .site-header { padding: 1rem; } }

        /* Skeleton Loading */
        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Page Header */
        .page-header-section { padding: 4rem 1rem 2rem; text-align: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .page-header-section h1 { font-size: 2.5rem; font-weight: 700; color: #fff; margin-bottom: 1rem; }
        .page-header-section p { font-size: 1.1rem; color: rgba(255,255,255,0.6); max-width: 600px; margin: 0 auto; }

        /* Compact Grid */
        .compact-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .compact-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 1.5rem; display: flex; flex-direction: column; transition: all 0.3s ease; text-decoration: none; }
        .compact-card:hover { transform: translateY(-4px); border-color: rgba(20, 184, 166, 0.3); background: rgba(255,255,255,0.05); box-shadow: 0 12px 30px rgba(0,0,0,0.3); }
        .compact-card .card-header { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1rem; }
        .compact-card img { width: 60px; height: 60px; object-fit: cover; border-radius: 12px; flex-shrink: 0; }
        .compact-card .card-info { flex: 1; min-width: 0; }
        .compact-card .card-title { font-size: 1.1rem; font-weight: 600; color: #fff; margin-bottom: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .compact-card .card-subtitle { font-size: 0.875rem; color: rgba(255,255,255,0.6); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .compact-card .card-btn { margin-top: auto; display: flex; align-items: center; justify-content: space-between; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05); }
        .compact-card .card-btn span { font-size: 0.875rem; color: #14b8a6; font-weight: 500; }
        .compact-card .card-btn i { color: #14b8a6; }

        .load-more-btn { display: block; margin: 2rem auto; padding: 0.75rem 2rem; background: rgba(20, 184, 166, 0.1); border: 1px solid rgba(20, 184, 166, 0.3); color: #14b8a6; border-radius: 24px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; }
        .load-more-btn:hover { background: #14b8a6; color: #fff; }

        @media (max-width: 768px) { 
            .compact-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; }
            .compact-card { padding: 1rem; }
            .compact-card img { width: 48px; height: 48px; }
            .page-header-section h1 { font-size: 2rem; }
        }

        .site-footer { padding: 4rem 1rem 2rem; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; margin-top: 5rem; }
        .footer-links { display: flex; justify-content: center; gap: 2rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .footer-links a { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.875rem; transition: color 0.2s ease; }
        .footer-links a:hover { color: rgba(255,255,255,0.8); }
        .footer-copy { color: rgba(255,255,255,0.3); font-size: 0.75rem; }
    </style>
</head>
<body class="dark" style="background: #000;">
    <div id="page">
        <header class="site-header">
            <a href="index.html" class="site-logo">ai.gnnis.com</a>
            <nav class="nav-links">
                <a href="index.html">首页</a>
                <a href="ai-tools.html" class="active">AI Tools</a>
                <a href="prompts.html">Prompts</a>
                <a href="blog.html">Skills</a>
            </nav>
            <div class="nav-actions"></div>
        </header>

        <main id="content-area" style="position: relative; z-index: 10; background: #000;">
            <!-- Page Header -->
            <section class="page-header-section">
                <h1>AI Tools 工具库</h1>
                <p>精选全球最受欢迎的AI工具，涵盖写作、绘画、视频、音频、编程等领域，助你提升创造力与工作效率。</p>
            </section>

            <!-- Hero Tools -->
            <div class="width astro-J7PV25F6" style="margin: 2rem auto;">
                <div id="hero-container">
                    <div class="skeleton" style="height: 200px; border-radius: 16px;"></div>
                </div>
            </div>

            <!-- Feature Tools -->
            <div class="width astro-J7PV25F6" style="margin: 2rem auto;">
                <div id="feature-container">
                    <div class="skeleton" style="height: 300px; border-radius: 16px;"></div>
                </div>
            </div>

            <!-- All Tools Grid -->
            <div class="width astro-J7PV25F6" style="padding: 2rem 1rem;">
                <h2 style="font-size: 1.5rem; font-weight: 600; color: #fff; margin-bottom: 1.5rem; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">全部工具</h2>
                <div id="compact-container">
                    <div class="compact-grid">
                        <div class="skeleton compact-card" style="height: 140px;"></div>
                        <div class="skeleton compact-card" style="height: 140px;"></div>
                        <div class="skeleton compact-card" style="height: 140px;"></div>
                        <div class="skeleton compact-card" style="height: 140px;"></div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="site-footer">
            <div class="footer-links">
                <a href="about.html">About Us</a>
                <a href="privacy.html">Privacy Policy</a>
                <a href="terms.html">Terms of Service</a>
                <a href="contact.html">Contact Us</a>
            </div>
            <div class="footer-copy">© 2026 ai.gnnis.com. All rights reserved.</div>
        </footer>
    </div>

    <script>
        async function loadContent() {
            try {
                const res = await fetch('content.json');
                const data = await res.json();
                
                // Render Hero
                const heroContainer = document.getElementById('hero-container');
                if (heroContainer && data.tools.hero) {
                    const heroHtml = data.tools.hero.map(item => 
                        `<div class="module astro-J7PV25F6" style="margin-bottom: 1rem;">
                            <div class="item draw astro-J7PV25F6" style="display: flex; align-items: center; gap: 2rem; padding: 2rem; background: rgba(255,255,255,0.03); border-radius: 16px; border: 1px solid rgba(255,255,255,0.08);">
                                <div style="flex-shrink: 0;"><img src="${item.img}" alt="${item.title}" loading="lazy" class="img astro-J7PV25F6" style="width: 120px; height: 120px; object-fit: cover; border-radius: 12px;"></div>
                                <div style="flex: 1;">
                                    <div class="title astro-J7PV25F6" style="font-size: 1.5rem; font-weight: 600; color: #fff; margin-bottom: 0.5rem;">${item.title}</div>
                                    <div class="subtitle astro-J7PV25F6" style="font-size: 1rem; color: rgba(255,255,255,0.6); margin-bottom: 1rem;">${item.subtitle}</div>
                                    <a href="${item.url}" target="_blank" rel="noopener" class="button astro-J7PV25F6" style="display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.5rem; background: rgba(20, 184, 166, 0.1); border: 1px solid rgba(20, 184, 166, 0.3); color: #14b8a6; border-radius: 8px; text-decoration: none; font-weight: 500; transition: all 0.2s;">
                                        <span>${item.btnText}</span><i class="iconfont icon-arrow-right"></i>
                                    </a>
                                </div>
                            </div>
                        </div>`
                    ).join('');
                    heroContainer.innerHTML = heroHtml;
                }

                // Render Features
                const featContainer = document.getElementById('feature-container');
                if (featContainer && data.tools.feature && data.tools.feature.length > 0) {
                    const featHtml = data.tools.feature.map(item => 
                        `<div class="module1-item astro-J7PV25F6" style="display: flex; align-items: center; gap: 1.5rem; padding: 1.5rem; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 1rem;">
                            <div style="flex-shrink: 0;"><img src="${item.img}" alt="${item.title}" loading="lazy" class="img astro-J7PV25F6" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;"></div>
                            <div style="flex: 1;">
                                <div class="title astro-J7PV25F6" style="font-size: 1.125rem; font-weight: 600; color: #fff; margin-bottom: 0.25rem;">${item.title}</div>
                                <div class="subtitle astro-J7PV25F6" style="font-size: 0.875rem; color: rgba(255,255,255,0.6); margin-bottom: 0.75rem;">${item.subtitle}</div>
                                <a href="${item.url}" target="_blank" rel="noopener" class="button astro-J7PV25F6" style="display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: rgba(20, 184, 166, 0.1); border: 1px solid rgba(20, 184, 166, 0.3); color: #14b8a6; border-radius: 6px; text-decoration: none; font-size: 0.875rem; font-weight: 500;">
                                    <span>${item.btnText}</span><i class="iconfont icon-arrow-right"></i>
                                </a>
                            </div>
                        </div>`
                    ).join('');
                    featContainer.innerHTML = featHtml;
                }

                // Render Compact Grid with Load More
                const compactContainer = document.getElementById('compact-container');
                if (compactContainer && data.tools.compact) {
                    const initialCount = 8;
                    const allItems = data.tools.compact;
                    
                    function renderCompactCards(items) {
                        return items.map(item => 
                            `<a href="${item.url}" target="_blank" rel="noopener" class="compact-card">
                                <div class="card-header">
                                    <img src="${item.img}" alt="${item.title}" loading="lazy">
                                    <div class="card-info">
                                        <div class="card-title">${item.title}</div>
                                        <div class="card-subtitle">${item.subtitle}</div>
                                    </div>
                                </div>
                                <div class="card-btn">
                                    <span>${item.btnText}</span>
                                    <i class="iconfont icon-arrow-right"></i>
                                </div>
                            </a>`
                        ).join('');
                    }
                    
                    let displayedCount = Math.min(initialCount, allItems.length);
                    let compHtml = `<div class="compact-grid">`;
                    compHtml += renderCompactCards(allItems.slice(0, displayedCount));
                    compHtml += `</div>`;
                    
                    if (allItems.length > displayedCount) {
                        compHtml += `<button class="load-more-btn" id="load-more-compact">加载更多 (${allItems.length - displayedCount} 个)</button>`;
                    }
                    compactContainer.innerHTML = compHtml;
                    
                    const loadMoreBtn = document.getElementById('load-more-compact');
                    if (loadMoreBtn) {
                        loadMoreBtn.addEventListener('click', function() {
                            const remaining = allItems.length - displayedCount;
                            const batchSize = 8;
                            const loadCount = Math.min(batchSize, remaining);
                            
                            displayedCount += loadCount;
                            const grid = compactContainer.querySelector('.compact-grid');
                            grid.innerHTML += renderCompactCards(allItems.slice(displayedCount - loadCount, displayedCount));
                            
                            if (displayedCount >= allItems.length) {
                                this.style.display = 'none';
                            } else {
                                this.textContent = `加载更多 (${allItems.length - displayedCount} 个)`;
                            }
                        });
                    }
                }
            } catch (e) {
                console.error('Failed to load content:', e);
            }
        }
        loadContent();
    </script>
</body>
</html>
