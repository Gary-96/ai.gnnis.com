    <style>
/* Site Header (Navbar) */
.site-header { position: sticky; top: 0; z-index: 9999; display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: rgba(0,0,0,0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.site-logo { color: #fff; font-size: 1.25rem; font-weight: 700; text-decoration: none; letter-spacing: -0.02em; }
.nav-links { display: flex; gap: 2.5rem; }
.nav-links a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.95rem; font-weight: 500; transition: color 0.2s ease; }
.nav-links a:hover { color: #14b8a6; }
.nav-links a.active { color: #14b8a6; font-weight: 600; }
.nav-actions { display: flex; gap: 1.5rem; align-items: center; }
.lang-btn { background: rgba(20, 184, 166, 0.1); border: 1px solid rgba(20, 184, 166, 0.3); color: #14b8a6; padding: 0.3rem 0.8rem; border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
.lang-btn:hover { background: #14b8a6; color: #fff; }
@media (max-width: 768px) { .nav-links { display: none; } .site-header { padding: 1rem; } }

      /* Prompt Section */
      .prompt-section { padding: 5rem 1rem; max-width: 1200px; margin: 0 auto; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      .prompt-header { margin-bottom: 3rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 1rem; }
      .prompt-header h2 { font-size: 2.5rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
      .prompt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
      .prompt-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; padding: 1.5rem; display: flex; flex-direction: column; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; position: relative; overflow: hidden; }
      .prompt-card:hover { transform: translateY(-4px); background: rgba(255, 255, 255, 0.06); border-color: rgba(20, 184, 166, 0.3); box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2); }
      .prompt-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #14b8a6, transparent); opacity: 0; transition: opacity 0.3s ease; }
      .prompt-card:hover::before { opacity: 1; }
      .prompt-title { font-size: 1.25rem; font-weight: 600; color: #fff; margin-bottom: 1rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .prompt-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
      .prompt-tag { font-size: 0.75rem; font-weight: 500; color: #14b8a6; background: rgba(20, 184, 166, 0.1); padding: 0.25rem 0.6rem; border-radius: 20px; border: 1px solid rgba(20, 184, 166, 0.2); }
      .prompt-actions { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
      .prompt-content-snippet { font-size: 0.875rem; color: rgba(255,255,255,0.4); display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 1.5rem; line-height: 1.6; }
      .copy-btn { background: rgba(255, 255, 255, 0.1); border: none; border-radius: 8px; padding: 0.5rem 1rem; color: #fff; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 0.5rem; z-index: 2; }
      .copy-btn:hover { background: #14b8a6; color: #fff; }

      /* Modal */
      .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 1000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 1rem; }
      .modal-overlay.active { opacity: 1; pointer-events: auto; }
      .modal-container { background: #111; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; transform: scale(0.95) translateY(20px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 40px 80px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
      .modal-overlay.active .modal-container { transform: scale(1) translateY(0); }
      .modal-header { padding: 2rem; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: flex-start; }
      .modal-title-text { font-size: 1.5rem; font-weight: 600; color: #fff; line-height: 1.3; margin-right: 1rem; margin: 0; }
      .modal-close { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 2rem; cursor: pointer; padding: 0; line-height: 1; transition: color 0.2s; align-self: flex-start; }
      .modal-close:hover { color: #fff; }
      .modal-body { padding: 2rem; overflow-y: auto; }
      .modal-section-title { font-size: 0.875rem; color: #14b8a6; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 0.75rem; }
      .modal-skills { font-size: 1rem; line-height: 1.6; color: rgba(255,255,255,0.8); margin-bottom: 2rem; background: rgba(20, 184, 166, 0.05); padding: 1rem 1.25rem; border-radius: 12px; border-left: 3px solid #14b8a6; }
      .modal-content-box { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 1.25rem; font-size: 0.95rem; line-height: 1.6; color: rgba(255,255,255,0.6); white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .modal-footer { padding: 1.5rem 2rem; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: flex-end; }
      .modal-btn-copy { background: #14b8a6; color: #fff; border: none; border-radius: 8px; padding: 0.75rem 1.5rem; font-size: 1rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 0.5rem; }
      .modal-btn-copy:hover { background: #0f9687; transform: translateY(-1px); }
      
      @media (max-width: 768px) {
        .prompt-header h2 { font-size: 2rem; }
        .prompt-grid { grid-template-columns: 1fr; }
        .modal-header, .modal-body, .modal-footer { padding: 1.25rem; }
        .modal-title-text { font-size: 1.25rem; }
        .modal-skills, .modal-content-box { padding: 1rem; }
      }
      /* Standard Site Footer */
      .site-footer { padding: 4rem 1rem 2rem; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; margin-top: 5rem; }
      .footer-links { display: flex; justify-content: center; gap: 2rem; margin-bottom: 2rem; flex-wrap: wrap; }
      .footer-links a { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.875rem; transition: color 0.2s ease; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      .footer-links a:hover { color: rgba(255,255,255,0.8); }
      .footer-copy { color: rgba(255,255,255,0.3); font-size: 0.75rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    </style>
</head>
<body class="dark" style="background: #000;">
    <div id="page">
        <header class="site-header">
            <a href="index.html" class="site-logo">ai.gnnis.com</a>
            <nav class="nav-links">
                <a href="index.html">首页</a>
                <a href="ai-tools.html">AI Tools</a>
                <a href="prompts.html" class="active">Prompts</a>
                <a href="blog.html">Skills</a>
            </nav>
            <div class="nav-actions">
                <svg style="color: rgba(255,255,255,0.7); cursor: pointer;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <button class="lang-btn">En / 中</button>
            </div>
        </header>

        <main id="content-area" style="position: relative; z-index: 10; background: #000;">
            <section class="prompt-section">
                <div class="prompt-header">
                    <h2>Prompt Library / 提示词库</h2>
                </div>
                <div id="prompt-container" class="prompt-grid"></div>
            </section>
        </main>

        <div id="prompt-modal" class="modal-overlay" onclick="closePromptModal(event)">
            <div class="modal-container" onclick="event.stopPropagation()">
                <div class="modal-header">
                    <h3 id="modal-title" class="modal-title-text"></h3>
                    <button class="modal-close" onclick="closePromptModal(event)">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="modal-section-title">使用技能说明</div>
                    <div id="modal-skills" class="modal-skills"></div>
                    <div class="modal-section-title">提示词内容</div>
                    <div id="modal-content" class="modal-content-box"></div>
                </div>
                <div class="modal-footer">
                    <button id="modal-copy-btn" class="modal-btn-copy" onclick="copyFromModal()">一键复制</button>
                </div>
            </div>
        </div>

        <footer class="site-footer">
            <div class="footer-links">
                <a href="about.html">About Us</a>
                <a href="privacy.html">Privacy Policy</a>
                <a href="terms.html">Terms of Service</a>
                <a href="contact.html">Contact Us</a>
            </div>
            <div class="footer-copy">© 2026 ai.gnnis.com. All rights reserved.</div>
        </footer>
    </div>


    <!-- Data Loading & Modal Script -->
    <script>
        let currentPromptIndex = -1;
        function openPromptModal(index) {
            const prompt = window.promptData[index];
            currentPromptIndex = index;
            document.getElementById('modal-title').textContent = prompt.title;
            document.getElementById('modal-skills').textContent = prompt.skills;
            document.getElementById('modal-content').textContent = prompt.content;
            document.getElementById('prompt-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closePromptModal(e) {
            document.getElementById('prompt-modal').classList.remove('active');
            document.body.style.overflow = '';
        }
        function copyText(text, callback) {
            navigator.clipboard.writeText(text).then(callback);
        }
        function copyFromModal() {
            const text = window.promptData[currentPromptIndex].content;
            copyText(text, () => {
                const btn = document.getElementById('modal-copy-btn');
                btn.textContent = '已复制!';
                setTimeout(() => btn.textContent = '一键复制', 2000);
            });
        }
        async function loadContent() {
            const res = await fetch('content.json');
            const data = await res.json();
            window.promptData = data.prompts;
            const container = document.getElementById('prompt-container');
            data.prompts.forEach((prompt, index) => {
                const tags = prompt.models.map(m => `<span class="prompt-tag">${m}</span>`).join('');
                container.innerHTML += `
                    <div class="prompt-card" onclick="openPromptModal(${index})">
                        <div class="prompt-tags">${tags}</div>
                        <div class="prompt-title">${prompt.title}</div>
                        <div class="prompt-content-snippet">${prompt.content}</div>
                        <div class="prompt-actions">
                            <button class="copy-btn" onclick="event.stopPropagation(); copyText(window.promptData[${index}].content, () => {})">复制</button>
                            <span>阅读技能 &rarr;</span>
                        </div>
                    </div>`;
            });
        }
        loadContent();
    </script>
</body>
