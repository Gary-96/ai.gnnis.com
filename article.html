    <script>
        // 从 URL 获取文章 ID
        function getArticleId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // 简单的 Markdown 转 HTML
        function markdownToHtml(markdown) {
            if (!markdown) return '';
            
            let html = markdown
                // 转义 HTML
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                // 代码块
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                // 行内代码
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                // 标题
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                // 加粗
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/__([^_]+)__/g, '<strong>$1</strong>')
                // 斜体
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/_([^_]+)_/g, '<em>$1</em>')
                // 删除线
                .replace(/~~([^~]+)~~/g, '<del>$1</del>')
                // 引用
                .replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>')
                // 无序列表
                .replace(/^\- (.*$)/gim, '<li>$1</li>')
                .replace(/^\* (.*$)/gim, '<li>$1</li>')
                // 有序列表
                .replace(/^\d+\. (.*$)/gim, '<li>$1</li>')
                // 链接
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
                // 分隔线
                .replace(/^---$/gim, '<hr>')
                // 段落
                .replace(/\n\n/g, '</p><p>');
            
            // 包裹列表
            html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
            
            // 包裹段落
            html = '<p>' + html + '</p>';
            
            // 清理空段落
            html = html.replace(/<p><\/p>/g, '');
            
            return html;
        }

        // 加载文章
        async function loadArticle() {
            const articleId = getArticleId();
            
            if (!articleId) {
                showError();
                return;
            }

            try {
                const res = await fetch('content.json');
                const data = await res.json();
                
                const article = data.articles.find(a => a.id === articleId);
                
                if (!article) {
                    showError();
                    return;
                }

                // 更新页面标题
                document.title = article.title + ' | ai.gnnis.com';
                
                // 填充文章内容
                document.getElementById('breadcrumb-title').textContent = article.title;
                document.getElementById('article-category').textContent = article.category;
                document.getElementById('article-title').textContent = article.title;
                document.getElementById('article-date').textContent = article.date;
                document.getElementById('article-author').textContent = article.author;
                document.getElementById('article-readtime').textContent = article.readTime;
                document.getElementById('article-body').innerHTML = markdownToHtml(article.content);

                // 隐藏加载状态，显示内容
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('article-content').style.display = 'block';

            } catch (e) {
                console.error('Failed to load article:', e);
                showError();
            }
        }

        function showError() {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('error-state').style.display = 'block';
        }

        // 页面加载时执行
        loadArticle();
    </script>
