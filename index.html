            <script>
                // 3D Rendering Script
                function project3D(x, y, z, vars) {
                    var p, d; x -= vars.camX; y -= vars.camY - 8; z -= vars.camZ;
                    p = Math.atan2(x, z); d = Math.sqrt(x * x + z * z);
                    x = Math.sin(p - vars.yaw) * d; z = Math.cos(p - vars.yaw) * d;
                    p = Math.atan2(y, z); d = Math.sqrt(y * y + z * z);
                    y = Math.sin(p - vars.pitch) * d; z = Math.cos(p - vars.pitch) * d;
                    var rx1 = -1000, ry1 = 1, rx2 = 1000, ry2 = 1, rx3 = 0, ry3 = 0, rx4 = x, ry4 = z;
                    var uc = (ry4 - ry3) * (rx2 - rx1) - (rx4 - rx3) * (ry2 - ry1);
                    var ua = ((rx4 - rx3) * (ry1 - ry3) - (ry4 - ry3) * (rx1 - rx3)) / uc;
                    var ub = ((rx2 - rx1) * (ry1 - ry3) - (ry2 - ry1) * (rx1 - rx3)) / uc;
                    if (!z) z = 0.000000001;
                    if (ua > 0 && ua < 1 && ub > 0 && ub < 1) {
                        return { x: vars.cx + (rx1 + ua * (rx2 - rx1)) * vars.scale, y: vars.cy + (y / z) * vars.scale, d: x * x + y * y + z * z };
                    } else return { d: -1 };
                }
                function elevation(x, y, z) { var dist = Math.sqrt(x * x + y * y + z * z); if (dist && z / dist >= -1 && z / dist <= 1) return Math.acos(z / dist); return 0.00000001; }
                function rgb(col) { col += 0.000001; var r = parseInt((0.5 + Math.sin(col) * 0.5) * 16), g = parseInt((0.5 + Math.cos(col) * 0.5) * 16), b = parseInt((0.5 - Math.sin(col) * 0.5) * 16); return '#' + r.toString(16) + g.toString(16) + b.toString(16); }
                function interpolateColors(RGB1, RGB2, degree) { var w2 = degree, w1 = 1 - w2; return [w1 * RGB1[0] + w2 * RGB2[0], w1 * RGB1[1] + w2 * RGB2[1], w1 * RGB1[2] + w2 * RGB2[2]]; }
                function rgbArray(col) { col += 0.000001; var r = parseInt((0.5 + Math.sin(col) * 0.5) * 256), g = parseInt((0.5 + Math.cos(col) * 0.5) * 256), b = parseInt((0.5 - Math.sin(col) * 0.5) * 256); return [r, g, b]; }
                function colorString(arr) { var r = parseInt(arr[0]), g = parseInt(arr[1]), b = parseInt(arr[2]); return '#' + ('0' + r.toString(16)).slice(-2) + ('0' + g.toString(16)).slice(-2) + ('0' + b.toString(16)).slice(-2); }
                function spawnParticle(vars) {
                    var p, ls, pt; pt = {}; p = Math.PI * 2 * Math.random(); ls = Math.sqrt(Math.random() * vars.distributionRadius);
                    pt.x = Math.sin(p) * ls; pt.y = -vars.vortexHeight / 2; pt.vy = vars.initV / 20 + Math.random() * vars.initV; pt.z = Math.cos(p) * ls; pt.radius = 200 + 800 * Math.random(); pt.color = pt.radius / 1000 + vars.frameNo / 250; vars.points.push(pt);
                }
                function drawFloor(vars) {
                    var x, y, z, d, point, a, size;
                    for (var i = -25; i <= 25; i += 1) {
                        for (var j = -25; j <= 25; j += 1) {
                            x = i * 2; z = j * 2; y = vars.floor; d = Math.sqrt(x * x + z * z); point = project3D(x, y - (d * d) / 85, z, vars);
                            if (point.d != -1) { size = 1 + 15000 / (1 + point.d); a = 0.15 - Math.pow(d / 50, 4) * 0.15; if (a > 0) { vars.ctx.fillStyle = colorString(interpolateColors(rgbArray(d / 26 - vars.frameNo / 40), [0, 128, 32], 0.5 + Math.sin(d / 6 - vars.frameNo / 8) / 2)); vars.ctx.globalAlpha = a; vars.ctx.fillRect(point.x - size / 2, point.y - size / 2, size, size); } }
                        }
                    }
                    for (var i = -25; i <= 25; i += 1) {
                        for (var j = -25; j <= 25; j += 1) {
                            x = i * 2; z = j * 2; y = -vars.floor; d = Math.sqrt(x * x + z * z); point = project3D(x, y + (d * d) / 85, z, vars);
                            if (point.d != -1) { size = 1 + 15000 / (1 + point.d); a = 0.15 - Math.pow(d / 50, 4) * 0.15; if (a > 0) { vars.ctx.fillStyle = colorString(interpolateColors(rgbArray(-d / 26 - vars.frameNo / 40), [32, 0, 128], 0.5 + Math.sin(-d / 6 - vars.frameNo / 8) / 2)); vars.ctx.globalAlpha = a; vars.ctx.fillRect(point.x - size / 2, point.y - size / 2, size, size); } }
                        }
                    }
                }
                function process(vars) {
                    if (vars.points.length < vars.initParticles) for (var i = 0; i < 5; ++i) spawnParticle(vars);
                    var p, d, t; p = Math.atan2(vars.camX, vars.camZ); d = Math.sqrt(vars.camX * vars.camX + vars.camZ * vars.camZ); d -= Math.sin(vars.frameNo / 80) / 25; t = Math.cos(vars.frameNo / 300) / 165; vars.camX = Math.sin(p + t) * d; vars.camZ = Math.cos(p + t) * d; vars.camY = -Math.sin(vars.frameNo / 220) * 15; vars.yaw = Math.PI + p + t; vars.pitch = elevation(vars.camX, vars.camZ, vars.camY) - Math.PI / 2;
                    for (var i = 0; i < vars.points.length; ++i) { var x = vars.points[i].x, y = vars.points[i].y, z = vars.points[i].z; d = Math.sqrt(x * x + z * z) / 1.0075; t = 0.1 / (1 + (d * d) / 5); p = Math.atan2(x, z) + t; vars.points[i].x = Math.sin(p) * d; vars.points[i].z = Math.cos(p) * d; vars.points[i].y += vars.points[i].vy * t * ((Math.sqrt(vars.distributionRadius) - d) * 2); if (vars.points[i].y > vars.vortexHeight / 2 || d < 0.25) { vars.points.splice(i, 1); spawnParticle(vars); } }
                }
                function frame(vars) {
                    if (vars === undefined) {
                        vars = { canvas: document.querySelector('#canvas'), points: [], frameNo: 0, camX: 0, camY: 0, camZ: -14, scale: 500, floor: 26.5, distributionRadius: 800, vortexHeight: 25, initParticles: 700, initV: 0.01 };
                        vars.ctx = vars.canvas.getContext('2d'); vars.canvas.width = document.body.clientWidth; vars.canvas.height = document.body.clientHeight; vars.cx = vars.canvas.width / 2; vars.cy = vars.canvas.height / 2;
                        window.onresize = () => { vars.canvas.width = document.body.clientWidth; vars.canvas.height = document.body.clientHeight; vars.cx = vars.canvas.width / 2; vars.cy = vars.canvas.height / 2; };
                        vars.pitch = elevation(vars.camX, vars.camZ, vars.camY) - Math.PI / 2; vars.yaw = 0;
                    }
                    vars.frameNo++; vars.ctx.globalAlpha = 0.15; vars.ctx.fillStyle = '#000'; vars.ctx.fillRect(0, 0, vars.canvas.width, vars.canvas.height);
                    process(vars); drawFloor(vars); vars.points.sort((a,b) => b.dist - a.dist);
                    for (var i = 0; i < vars.points.length; ++i) {
                        var pt = project3D(vars.points[i].x, vars.points[i].y, vars.points[i].z, vars);
                        if (pt.d != -1) { vars.points[i].dist = pt.d; var size = 1 + vars.points[i].radius / (1 + pt.d); var distY = Math.abs(vars.points[i].y); var al = 0.8 - Math.pow(distY / (vars.vortexHeight / 2), 1000) * 0.8; vars.ctx.globalAlpha = al >= 0 && al <= 1 ? al : 0; vars.ctx.fillStyle = rgb(vars.points[i].color); if (pt.x > -1 && pt.x < vars.canvas.width && pt.y > -1 && pt.y < vars.canvas.height) vars.ctx.fillRect(pt.x - size / 2, pt.y - size / 2, size, size); }
                    }
                    requestAnimationFrame(() => frame(vars));
                }
                frame();
            </script>

                                <div class="button astro-J7PV25F6" onclick="location.href='${f1.url}'"><span>${f1.btnText}</span><div class="icon astro-J7PV25F6"><i class="iconfont icon-arrow-right astro-J7PV25F6"></i></div></div>
                            </div>
                        </div><div class="module1-hr astro-J7PV25F6"></div><div class="module1-right astro-J7PV25F6">`;
                    data.tools.feature.slice(1).forEach((item, idx) => {
                        featHtml += `
                            <div class="item ${idx===1?'chat':'draw'} astro-J7PV25F6">
                                <div class="module1-right-img astro-J7PV25F6"><img src="${item.img}" class="img astro-J7PV25F6"></div>
                                <div class="module1-right-text astro-J7PV25F6">

                                    <div class="button astro-J7PV25F6" onclick="location.href='${item.url}'"><span>${item.btnText}</span><div class="icon astro-J7PV25F6"><i class="iconfont icon-arrow-right astro-J7PV25F6"></i></div></div>
                                </div>
                            </div>`;
                        if (idx < data.tools.feature.slice(1).length - 1) featHtml += `<div class="module1-hr astro-J7PV25F6"></div>`;
                    });
                    featHtml += `</div></div></div>`;
                    featContainer.innerHTML = featHtml;
                }

                // Render Compact
                const compactContainer = document.getElementById('compact-container');
                if (compactContainer && data.tools.compact) {
                    let compHtml = `<div class="width astro-J7PV25F6"><div class="module3 astro-J7PV25F6">`;
                    data.tools.compact.forEach((item, idx) => {
                        compHtml += `
                            <div class="module3-item item ${idx%2===0?'draw':'chat'} astro-J7PV25F6" onclick="location.href='${item.url}'">
                                <div class="module3-left astro-J7PV25F6">
                                    <div><div class="title astro-J7PV25F6">${item.title}</div><div class="subtitle astro-J7PV25F6">${item.subtitle}</div></div>
                                    <div class="btn astro-J7PV25F6"><span>${item.btnText}</span><div class="icon astro-J7PV25F6"><i class="iconfont icon-arrow-right astro-J7PV25F6"></i></div></div>
                                </div>
                                <div class="module3-right astro-J7PV25F6"><img src="${item.img}" class="img astro-J7PV25F6"></div>
                            </div>`;
                        if (idx < data.tools.compact.length - 1) compHtml += `<div class="module3-hr astro-J7PV25F6"></div>`;
                    });
                    compHtml += `</div></div>`;
                    compactContainer.innerHTML = compHtml;
