  function project3D(x, y, z, vars) {
    var p, d
    x -= vars.camX
    y -= vars.camY - 8
    z -= vars.camZ
    p = Math.atan2(x, z)
    d = Math.sqrt(x * x + z * z)
    x = Math.sin(p - vars.yaw) * d
    z = Math.cos(p - vars.yaw) * d
    p = Math.atan2(y, z)
    d = Math.sqrt(y * y + z * z)
    y = Math.sin(p - vars.pitch) * d
    z = Math.cos(p - vars.pitch) * d
    var rx1 = -1000
    var ry1 = 1
    var rx2 = 1000
    var ry2 = 1
    var rx3 = 0
    var ry3 = 0
    var rx4 = x
    var ry4 = z
    var uc = (ry4 - ry3) * (rx2 - rx1) - (rx4 - rx3) * (ry2 - ry1)
    var ua = ((rx4 - rx3) * (ry1 - ry3) - (ry4 - ry3) * (rx1 - rx3)) / uc
    var ub = ((rx2 - rx1) * (ry1 - ry3) - (ry2 - ry1) * (rx1 - rx3)) / uc
    if (!z) z = 0.000000001
    if (ua > 0 && ua < 1 && ub > 0 && ub < 1) {
      return {
        x: vars.cx + (rx1 + ua * (rx2 - rx1)) * vars.scale,
        y: vars.cy + (y / z) * vars.scale,
        d: x * x + y * y + z * z,
      }
    } else {
      return { d: -1 }
    }
  }

  function elevation(x, y, z) {
    var dist = Math.sqrt(x * x + y * y + z * z)
    if (dist && z / dist >= -1 && z / dist <= 1) return Math.acos(z / dist)
    return 0.00000001
  }

  function rgb(col) {
    col += 0.000001
    var r = parseInt((0.5 + Math.sin(col) * 0.5) * 16)
    var g = parseInt((0.5 + Math.cos(col) * 0.5) * 16)
    var b = parseInt((0.5 - Math.sin(col) * 0.5) * 16)
    return '#' + r.toString(16) + g.toString(16) + b.toString(16)
  }

  function interpolateColors(RGB1, RGB2, degree) {
    var w2 = degree
    var w1 = 1 - w2
    return [
      w1 * RGB1[0] + w2 * RGB2[0],
      w1 * RGB1[1] + w2 * RGB2[1],
      w1 * RGB1[2] + w2 * RGB2[2],
    ]
  }

  function rgbArray(col) {
    col += 0.000001
    var r = parseInt((0.5 + Math.sin(col) * 0.5) * 256)
    var g = parseInt((0.5 + Math.cos(col) * 0.5) * 256)
    var b = parseInt((0.5 - Math.sin(col) * 0.5) * 256)
    return [r, g, b]
  }

  function colorString(arr) {
    var r = parseInt(arr[0])
    var g = parseInt(arr[1])
    var b = parseInt(arr[2])
    return (
      '#' +
      ('0' + r.toString(16)).slice(-2) +
      ('0' + g.toString(16)).slice(-2) +
      ('0' + b.toString(16)).slice(-2)
    )
  }

  function process(vars) {
    if (vars.points.length < vars.initParticles)
      for (var i = 0; i < 5; ++i) spawnParticle(vars)
    var p, d, t

    p = Math.atan2(vars.camX, vars.camZ)
    d = Math.sqrt(vars.camX * vars.camX + vars.camZ * vars.camZ)
    d -= Math.sin(vars.frameNo / 80) / 25
    t = Math.cos(vars.frameNo / 300) / 165
    vars.camX = Math.sin(p + t) * d
    vars.camZ = Math.cos(p + t) * d
    vars.camY = -Math.sin(vars.frameNo / 220) * 15
    vars.yaw = Math.PI + p + t
    vars.pitch = elevation(vars.camX, vars.camZ, vars.camY) - Math.PI / 2

    var t
    for (var i = 0; i < vars.points.length; ++i) {
      x = vars.points[i].x
      y = vars.points[i].y
      z = vars.points[i].z
      d = Math.sqrt(x * x + z * z) / 1.0075
      t = 0.1 / (1 + (d * d) / 5)
      p = Math.atan2(x, z) + t
      vars.points[i].x = Math.sin(p) * d
      vars.points[i].z = Math.cos(p) * d
      vars.points[i].y +=
        vars.points[i].vy * t * ((Math.sqrt(vars.distributionRadius) - d) * 2)
      if (vars.points[i].y > vars.vortexHeight / 2 || d < 0.25) {
        vars.points.splice(i, 1)
        spawnParticle(vars)
      }
    }
  }

  function drawFloor(vars) {
    var x, y, z, d, point, a
    for (var i = -25; i <= 25; i += 1) {
      for (var j = -25; j <= 25; j += 1) {
        x = i * 2
        z = j * 2
        y = vars.floor
        d = Math.sqrt(x * x + z * z)
        point = project3D(x, y - (d * d) / 85, z, vars)
        if (point.d != -1) {
          size = 1 + 15000 / (1 + point.d)
          a = 0.15 - Math.pow(d / 50, 4) * 0.15
          if (a > 0) {
            vars.ctx.fillStyle = colorString(
              interpolateColors(
                rgbArray(d / 26 - vars.frameNo / 40),
                [0, 128, 32],
                0.5 + Math.sin(d / 6 - vars.frameNo / 8) / 2
              )
            )
            vars.ctx.globalAlpha = a
            vars.ctx.fillRect(
              point.x - size / 2,
              point.y - size / 2,
              size,
              size
            )
          }
        }
      }
    }
    vars.ctx.fillStyle = '#82f'
    for (var i = -25; i <= 25; i += 1) {
      for (var j = -25; j <= 25; j += 1) {
        x = i * 2
        z = j * 2
        y = -vars.floor
        d = Math.sqrt(x * x + z * z)
        point = project3D(x, y + (d * d) / 85, z, vars)
        if (point.d != -1) {
          size = 1 + 15000 / (1 + point.d)
          a = 0.15 - Math.pow(d / 50, 4) * 0.15
          if (a > 0) {
            vars.ctx.fillStyle = colorString(
              interpolateColors(
                rgbArray(-d / 26 - vars.frameNo / 40),
                [32, 0, 128],
                0.5 + Math.sin(-d / 6 - vars.frameNo / 8) / 2
              )
            )
            vars.ctx.globalAlpha = a
            vars.ctx.fillRect(
              point.x - size / 2,
              point.y - size / 2,
              size,
              size
            )
          }
        }
      }
    }
  }

  function sortFunction(a, b) {
    return b.dist - a.dist
  }
  function getTheme(){
    return localStorage.getItem("THEME")
  }
  function draw(vars) {
    var theme = getTheme()
    vars.ctx.globalAlpha = 0.15
    vars.ctx.fillStyle = theme=="dark"?'#000':"#fff"
    vars.ctx.fillRect(0, 0, canvas.width, canvas.height)

    drawFloor(vars)

    var point, x, y, z, a
    for (var i = 0; i < vars.points.length; ++i) {
      x = vars.points[i].x
      y = vars.points[i].y
      z = vars.points[i].z
      point = project3D(x, y, z, vars)
      if (point.d != -1) {
        vars.points[i].dist = point.d
        size = 1 + vars.points[i].radius / (1 + point.d)
        d = Math.abs(vars.points[i].y)
        a = 0.8 - Math.pow(d / (vars.vortexHeight / 2), 1000) * 0.8
        vars.ctx.globalAlpha = a >= 0 && a <= 1 ? a : 0
        vars.ctx.fillStyle = rgb(vars.points[i].color)
        if (
          point.x > -1 &&
          point.x < vars.canvas.width &&
          point.y > -1 &&
          point.y < vars.canvas.height
        )
          vars.ctx.fillRect(point.x - size / 2, point.y - size / 2, size, size)
      }
    }
    vars.points.sort(sortFunction)
  }

  function spawnParticle(vars) {
    var p, ls
    pt = {}
    p = Math.PI * 2 * Math.random()
    ls = Math.sqrt(Math.random() * vars.distributionRadius)
    pt.x = Math.sin(p) * ls
    pt.y = -vars.vortexHeight / 2
    pt.vy = vars.initV / 20 + Math.random() * vars.initV
    pt.z = Math.cos(p) * ls
    pt.radius = 200 + 800 * Math.random()
    pt.color = pt.radius / 1000 + vars.frameNo / 250
    vars.points.push(pt)
  }

  function frame(vars) {
    if (vars === undefined) {
      var vars = {}
      vars.canvas = document.querySelector('canvas')
      vars.ctx = vars.canvas.getContext('2d')
      vars.canvas.width = document.body.clientWidth
      vars.canvas.height = document.body.clientHeight
      window.addEventListener(
        'resize',
        function () {
          vars.canvas.width = document.body.clientWidth
          vars.canvas.height = document.body.clientHeight
          vars.cx = vars.canvas.width / 2
          vars.cy = vars.canvas.height / 2
        },
        true
      )
      vars.frameNo = 0

      vars.camX = 0
      vars.camY = 0
      vars.camZ = -14
      vars.pitch = elevation(vars.camX, vars.camZ, vars.camY) - Math.PI / 2
      vars.yaw = 0
      vars.cx = vars.canvas.width / 2
      vars.cy = vars.canvas.height / 2
      vars.bounding = 10
      vars.scale = 500
      vars.floor = 26.5

      vars.points = []
      vars.initParticles = 700
      vars.initV = 0.01
      vars.distributionRadius = 800
      vars.vortexHeight = 25
    }

    vars.frameNo++
    requestAnimationFrame(function () {
      frame(vars)
    })

    process(vars)
    draw(vars)
  }
  frame()

    <script>
      // Prompt modal logic
      let currentPromptIndex = -1;

      function openPromptModal(index) {
        if(!window.promptData) return;
        const prompt = window.promptData[index];
        currentPromptIndex = index;
        
        document.getElementById('modal-title').textContent = prompt.title;
        document.getElementById('modal-skills').textContent = prompt.skills;
        document.getElementById('modal-content').textContent = prompt.content;
        
        const modal = document.getElementById('prompt-modal');
        modal.classList.add('active');
        document.body.style.overflow = 'hidden'; // prevent scrolling
      }

      function closePromptModal(e) {
        if(e) {
          // If event is provided, verify it's a valid close target
          if(e.target !== document.getElementById('prompt-modal') && 
             e.target.className !== 'modal-close' && 
             !e.target.closest('.modal-close')) {
            return;
          }
        }
        const modal = document.getElementById('prompt-modal');
        modal.classList.remove('active');
        document.body.style.overflow = '';
        setTimeout(() => resetCopyButton(), 300);
      }

      function resetCopyButton() {
        const btnText = document.getElementById('modal-copy-text');
        btnText.textContent = '一键复制';
      }

      function copyText(text, callback) {
        if(navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(text).then(callback);
        } else {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          Object.assign(textArea.style, { position: 'fixed', top: '-9999px', opacity: 0 });
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          try { document.execCommand('copy'); callback(); } catch (err) { console.error('Fallback: Oops, unable to copy', err); callback(); }
          document.body.removeChild(textArea);
        }
      }

      function copyPromptText(event, index) {
        event.stopPropagation();
        if(!window.promptData) return;
        const text = window.promptData[index].content;
        const btn = event.currentTarget;
        const orgHtml = btn.innerHTML;
        
        copyText(text, () => {
          btn.innerHTML = '已复制!';
          btn.style.background = '#14b8a6';
          setTimeout(() => {
            btn.innerHTML = orgHtml;
            btn.style.background = '';
          }, 2000);
        });
      }

      function copyFromModal() {
        if(currentPromptIndex === -1 || !window.promptData) return;
        const text = window.promptData[currentPromptIndex].content;
        const textSpan = document.getElementById('modal-copy-text');
        
        copyText(text, () => {
          textSpan.textContent = '复制成功!';
          setTimeout(() => {
            textSpan.textContent = '一键复制';
          }, 2000);
        });
      }

      async function loadContent() {
        try {
          const res = await fetch('content.json');
          const data = await res.json();
          
          // Render Hero
          const heroContainer = document.getElementById('hero-container');
          data.tools.hero.forEach(item => {
            heroContainer.innerHTML += `
              <div class="width astro-J7PV25F6" style="margin-top:2rem">
                <div class="module astro-J7PV25F6">
                  <div class="item draw astro-J7PV25F6">
                    <div class="module-left astro-J7PV25F6"><img src="${item.img}" class="img astro-J7PV25F6"></div>
                    <div class="module-right astro-J7PV25F6">
                      <div><div class="title astro-J7PV25F6">${item.title}</div><div class="subtitle astro-J7PV25F6">${item.subtitle}</div></div>
                      <div class="button astro-J7PV25F6" style="margin-top: 9rem;" onclick="location.href='${item.url}'">
                        <span>${item.btnText}</span><div class="icon astro-J7PV25F6"><i class="iconfont icon-arrow-right astro-J7PV25F6"></i></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>`;
          });

          // Render Features
          const featContainer = document.getElementById('feature-container');
          if (data.tools.feature && data.tools.feature.length > 0) {
            let featHtml = `<div class="width astro-J7PV25F6"><div class="module1 astro-J7PV25F6">`;
            // Left Big Card
            const f1 = data.tools.feature[0];
            featHtml += `
              <div class="item module1-left draw astro-J7PV25F6">
                <div><img src="${f1.img}" class="img astro-J7PV25F6"></div>
                <div class="module1-left-text astro-J7PV25F6">
                  <div><div class="title astro-J7PV25F6">${f1.title}</div><div class="subtitle astro-J7PV25F6">${f1.subtitle}</div></div>
                  <div class="button astro-J7PV25F6" onclick="location.href='${f1.url}'"><span>${f1.btnText}</span><div class="icon astro-J7PV25F6"><i class="iconfont icon-arrow-right astro-J7PV25F6"></i></div></div>
                </div>
              </div><div class="module1-hr astro-J7PV25F6"></div><div class="module1-right astro-J7PV25F6">`;
            
            // Right Small Cards
            data.tools.feature.slice(1).forEach((item, idx) => {
              featHtml += `
                <div class="item ${idx===1?'chat':'draw'} astro-J7PV25F6">
                  <div class="module1-right-img astro-J7PV25F6"><img src="${item.img}" class="img astro-J7PV25F6"></div>
                  <div class="module1-right-text astro-J7PV25F6">
                    <div><div class="title astro-J7PV25F6">${item.title}</div><div class="subtitle astro-J7PV25F6">${item.subtitle}</div></div>
                    <div class="button astro-J7PV25F6" onclick="location.href='${item.url}'"><span>${item.btnText}</span><div class="icon astro-J7PV25F6"><i class="iconfont icon-arrow-right astro-J7PV25F6"></i></div></div>
                  </div>
                </div>`;
              if (idx < data.tools.feature.slice(1).length - 1) featHtml += `<div class="module1-hr astro-J7PV25F6"></div>`;
            });
            featHtml += `</div></div></div>`;
            featContainer.innerHTML = featHtml;
          }

          // Render Compact
          const compactContainer = document.getElementById('compact-container');
          let compHtml = `<div class="width astro-J7PV25F6"><div class="module3 astro-J7PV25F6">`;
          data.tools.compact.forEach((item, idx) => {
            compHtml += `
              <div class="module3-item item ${idx%2===0?'draw':'chat'} astro-J7PV25F6" onclick="location.href='${item.url}'">
                <div class="module3-left astro-J7PV25F6">
                  <div><div class="title astro-J7PV25F6">${item.title}</div><div class="subtitle astro-J7PV25F6">${item.subtitle}</div></div>
                  <div class="btn astro-J7PV25F6"><span>${item.btnText}</span><div class="icon astro-J7PV25F6"><i class="iconfont icon-arrow-right astro-J7PV25F6"></i></div></div>
                </div>
                <div class="module3-right astro-J7PV25F6"><img src="${item.img}" class="img astro-J7PV25F6"></div>
              </div>`;
            if (idx < data.tools.compact.length - 1) compHtml += `<div class="module3-hr astro-J7PV25F6"></div>`;
          });
          compHtml += `</div></div>`;
          compactContainer.innerHTML = compHtml;

          // Render Blog
          const blogContainer = document.getElementById('blog-container');
          data.articles.forEach(art => {
            blogContainer.innerHTML += `
              <a href="${art.url}" class="blog-card">
                <div class="meta">${art.category} • ${art.date}</div>
                <h3>${art.title}</h3>
                <p>${art.excerpt}</p>
                <div class="btn-read">阅读全文 →</div>
              </a>`;
          });

          // Render Prompt Library
          const promptContainer = document.getElementById('prompt-container');
          if (data.prompts && promptContainer) {
            window.promptData = data.prompts; // Save globally for modal
            data.prompts.forEach((prompt, index) => {
              const tagsHtml = prompt.models.map(m => `<span class="prompt-tag">${m}</span>`).join('');
              promptContainer.innerHTML += `
                <div class="prompt-card" onclick="openPromptModal(${index})">
                  <div class="prompt-tags">${tagsHtml}</div>
                  <div class="prompt-title">${prompt.title}</div>
                  <div class="prompt-content-snippet">${prompt.content}</div>
                  <div class="prompt-actions">
                    <button class="copy-btn" onclick="copyPromptText(event, ${index})">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                      复制
                    </button>
                    <span style="font-size:13px; color:rgba(255,255,255,0.4); font-weight:500;">阅读技能说明 &rarr;</span>
                  </div>
                </div>`;
            });
          }
        } catch (e) {
          console.error('Failed to load dynamic content:', e);
        }
      }
      loadContent();
    </script>

  </div>
  <script type="text/javascript">
    ;(function () {
      const el = document.querySelector('body')
      const theme = localStorage.getItem('THEME') ?? 'dark'
      el.setAttribute('class', theme)
      localStorage.setItem('THEME', theme)
      const html = document.documentElement
      function setFont() {
        const cliWidth = html.clientWidth
        if (cliWidth > 1920) {
          html.style.fontSize = '16px'
          return
        }
        html.style.fontSize =
          (16 * (cliWidth / 1920) < 10 ? 10 : 16 * (cliWidth / 1920)) + 'px'
      }
      setFont()
      window.onresize = function () {
        setFont()
      }
    })()
  </script>
</body>
</html>
